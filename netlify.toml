# Netlify configuration for syntax-quiz SPA

[build]
  publish = "dist"
  command = "npm run build"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/syntax-quiz/level/1/questions"
  to = "/level/1/questions"
  status = 301

[[redirects]]
  from = "/syntax-quiz/level/1/score"
  to = "/level/1/score"
  status = 301

[[redirects]]
  from = "/syntax-quiz/level/2/questions"
  to = "/level/2/questions"
  status = 301

[[redirects]]
  from = "/syntax-quiz/level/2/score"
  to = "/level/2/score"
  status = 301

[[redirects]]
  from = "/syntax-quiz/level/3/questions"
  to = "/level/3/questions"
  status = 301

[[redirects]]
  from = "/syntax-quiz/level/3/score"
  to = "/level/3/score"
  status = 301

# Static API: serve pre-built JSON for read-only endpoints (no function invocation)
[[redirects]]
  from = "/api/levels"
  to = "/api-static/levels.json"
  status = 200
  force = true

[[redirects]]
  from = "/api/questions"
  to = "/api-static/questions-:level.json"
  status = 200
  force = true
  [redirects.query]
    level = ":level"

# Route remaining API requests (play, docs) to the Netlify function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

# Redirect all requests to index.html for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache headers for static API JSON (CDN caches until next deploy, browsers revalidate)
[[headers]]
  for = "/api-static/*"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "public, max-age=0, must-revalidate"
    Netlify-CDN-Cache-Control = "public, max-age=31536000, durable"
